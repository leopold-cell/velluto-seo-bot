name: Daily SEO Blog Post

on:
  workflow_dispatch:       # VPS cron übernimmt — nur noch manuell triggerbar

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run SEO bot
        env:
          SHOPIFY_TOKEN:     ${{ secrets.SHOPIFY_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY:    ${{ secrets.OPENAI_API_KEY }}
          SHOPIFY_STORE:     ${{ secrets.SHOPIFY_STORE }}
          BLOG_ID:           ${{ secrets.BLOG_ID }}
          EMAIL_FROM:        ${{ secrets.EMAIL_FROM }}
          EMAIL_APP_PASS:    ${{ secrets.EMAIL_APP_PASS }}
          EMAIL_TO:          ${{ secrets.EMAIL_TO }}
        run: python seo_bot.py

      - name: Build backlinks
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}
          REDDIT_CLIENT_ID:     ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          REDDIT_USERNAME:      ${{ secrets.REDDIT_USERNAME }}
          REDDIT_PASSWORD:      ${{ secrets.REDDIT_PASSWORD }}
        run: python link_builder.py

      - name: Run SEO optimizer
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}
          SHOPIFY_TOKEN:        ${{ secrets.SHOPIFY_TOKEN }}
          SHOPIFY_STORE:        ${{ secrets.SHOPIFY_STORE }}
          BLOG_ID:              ${{ secrets.BLOG_ID }}
          GOOGLE_CLIENT_ID:     ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
        run: python seo_optimizer.py

      - name: Build dashboard
        continue-on-error: true
        env:
          SHOPIFY_TOKEN:          ${{ secrets.SHOPIFY_TOKEN }}
          SHOPIFY_STORE:          ${{ secrets.SHOPIFY_STORE }}
          BLOG_ID:                ${{ secrets.BLOG_ID }}
          GOOGLE_CLIENT_ID:       ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET:   ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN:   ${{ secrets.GOOGLE_REFRESH_TOKEN }}
        run: python dashboard.py

      - name: Commit & push dashboard + logs
        continue-on-error: true
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html token_usage.json topics_used.json topics_dynamic.json ranking_history.json images_used.json seo_insights.json competitors_discovered.json published_today.json link_building_log.json gsc_data.json
          git diff --cached --quiet || git commit -m "chore: daily dashboard update $(date -u +%Y-%m-%d)"
          git push

      - name: Notify by email on failure
        if: failure()
        env:
          EMAIL_FROM:     ${{ secrets.EMAIL_FROM }}
          EMAIL_APP_PASS: ${{ secrets.EMAIL_APP_PASS }}
          EMAIL_TO:       ${{ secrets.EMAIL_TO }}
        run: |
          python3 - <<'PY' || true
          import os, smtplib
          from email.message import EmailMessage
          sender = os.getenv("EMAIL_FROM", "")
          pw     = os.getenv("EMAIL_APP_PASS", "").replace(" ", "")
          if sender and pw:
              m = EmailMessage()
              m["Subject"] = "❌ Velluto SEO Bot FAILED — GitHub Actions"
              m["From"] = sender
              m["To"] = os.getenv("EMAIL_TO", sender)
              m.set_content("Check logs: https://github.com/leopold-cell/velluto-seo-bot/actions")
              with smtplib.SMTP("smtp.gmail.com", 587, timeout=60) as s:
                  s.starttls(); s.login(sender, pw); s.send_message(m)
          PY
