name: Daily SEO Blog Post

on:
  schedule:
    - cron: '0 7 * * *'  # 08:00 CET (07:00 UTC)
  workflow_dispatch:       # allow manual trigger from GitHub UI

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run SEO bot
        env:
          SHOPIFY_TOKEN:     ${{ secrets.SHOPIFY_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY:    ${{ secrets.OPENAI_API_KEY }}
          SHOPIFY_STORE:     ${{ secrets.SHOPIFY_STORE }}
          BLOG_ID:           ${{ secrets.BLOG_ID }}
        run: python seo_bot.py

      - name: Build dashboard
        env:
          SHOPIFY_TOKEN:  ${{ secrets.SHOPIFY_TOKEN }}
          SHOPIFY_STORE:  ${{ secrets.SHOPIFY_STORE }}
          BLOG_ID:        ${{ secrets.BLOG_ID }}
        run: python dashboard.py

      - name: Commit & push dashboard + logs
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html token_usage.json topics_used.json ranking_history.json
          git diff --cached --quiet || git commit -m "chore: daily dashboard update $(date -u +%Y-%m-%d)"
          git push
