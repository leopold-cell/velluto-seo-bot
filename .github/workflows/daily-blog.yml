name: Daily SEO Blog Post

on:
  schedule:
    - cron: '0 6 * * *'  # 08:00 CEST summer / 07:00 CET winter (06:00 UTC)
  workflow_dispatch:       # allow manual trigger from GitHub UI

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run SEO bot
        env:
          SHOPIFY_TOKEN:     ${{ secrets.SHOPIFY_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY:    ${{ secrets.OPENAI_API_KEY }}
          SHOPIFY_STORE:     ${{ secrets.SHOPIFY_STORE }}
          BLOG_ID:           ${{ secrets.BLOG_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python seo_bot.py

      - name: Run SEO optimizer
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SHOPIFY_TOKEN:     ${{ secrets.SHOPIFY_TOKEN }}
          SHOPIFY_STORE:     ${{ secrets.SHOPIFY_STORE }}
          BLOG_ID:           ${{ secrets.BLOG_ID }}
        run: python seo_optimizer.py

      - name: Build dashboard
        continue-on-error: true
        env:
          SHOPIFY_TOKEN:  ${{ secrets.SHOPIFY_TOKEN }}
          SHOPIFY_STORE:  ${{ secrets.SHOPIFY_STORE }}
          BLOG_ID:        ${{ secrets.BLOG_ID }}
        run: python dashboard.py

      - name: Commit & push dashboard + logs
        continue-on-error: true
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html token_usage.json topics_used.json topics_dynamic.json ranking_history.json images_used.json seo_insights.json
          git diff --cached --quiet || git commit -m "chore: daily dashboard update $(date -u +%Y-%m-%d)"
          git push

      - name: Notify Telegram on failure
        if: failure()
        run: |
          TEXT="❌ Velluto SEO Bot FAILED $(date +%Y-%m-%d) — check logs: https://github.com/leopold-cell/velluto-seo-bot/actions"
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            --data-urlencode "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            --data-urlencode "text=${TEXT}" || true
